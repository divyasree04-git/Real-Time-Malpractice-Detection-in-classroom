<!DOCTYPE html>
<html>
<head>
    <title>Real Time Exam Malpractice Detection | Live Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand">
                <strong>Real Time Exam Malpractice Detection</strong>
                <span class="badge bg-light text-primary ms-2">Live Monitoring</span>
            </a>
            <div class="navbar-text text-white">
                Welcome, {{ session['username'] }} | 
                <a href="{{ url_for('dashboard') }}" class="text-white text-decoration-none">Dashboard</a> | 
                <a href="{{ url_for('logout') }}" class="text-white text-decoration-none">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Live Tracking</h5>
                <div>
                    <button onclick="startClass()" class="btn btn-success" id="startBtn">Start Exam</button>
                    <button onclick="stopClass()" class="btn btn-danger" id="stopBtn" disabled>Stop Exam</button>
                </div>
            </div>
            <div class="card-body text-center">
                <img src="{{ url_for('video_feed') }}" class="img-fluid">
            </div>
        </div>
    </div>

    <script>
        function startClass() {
            fetch('/start_class')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        document.getElementById('startBtn').disabled = true;
                        document.getElementById('stopBtn').disabled = false;
                        alert('Exam Started! Monitoring is now active.');
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to start exam');
                });
        }

        function stopClass() {
            fetch('/stop_class')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        document.getElementById('startBtn').disabled = false;
                        document.getElementById('stopBtn').disabled = true;
                        window.location.href = '/dashboard';
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to stop exam');
                });
        }
    </script>
</body>
</html>
